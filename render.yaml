services:
  - type: web
    name: urbanoracle-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CITY_VECTORS_PATH
        value: data/city_vectors.npy
      - key: CITY_INDEX_PATH
        value: data/city_index.json
      - key: SCALER_PATH
        value: data/scaler.pkl